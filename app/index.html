<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORB/IB Simulator — playback skeleton</title>
  </head>
  <body>
    <header id="toolbar">
      <div class="group">
        <strong id="title">—</strong>
      </div>
      <div class="group">
        <button id="play">▶ Play</button>
        <button id="step">⏭ Step</button>
        <button id="review" title="Concede the attempt and scrub the full day">⏹ End &amp; Review</button>
      </div>
      <div class="group" id="speeds" title="Speed changes cadence only"></div>
      <div class="group" id="timeframes" title="Co-primary timeframes"></div>
      <div class="group readout">
        <span class="label">clock (ET)</span><span id="clock" class="mono">--:--:--</span>
        <span class="label">last</span><span id="price" class="mono">—</span>
        <span class="label">bars</span><span id="progress" class="mono">0 / 0</span>
      </div>
    </header>
    <div id="workspace">
      <main id="chart">
        <div id="chartTools" hidden>
          <button type="button" id="addLevel">＋ Level</button>
          <button type="button" id="addRange">▭ Range</button>
          <button type="button" id="clearMarks">Clear</button>
        </div>
      </main>
      <aside id="sidebar">
        <section id="prepPanel">
          <div class="ticket-title" id="prepTitle">Prep — the day opens locked</div>
          <div id="prepForm">
            <p class="muted prep-hint">
              Use the toolbar on the chart to mark the levels and zones you read on the prior day,
              call the bias, then commit to freeze your plan and start the session.
            </p>
            <div id="prepLevels" class="box"></div>
            <div class="field">
              <label>Bias</label>
              <textarea id="biasProse" rows="3" placeholder="Prose read of the day…"></textarea>
            </div>
            <div class="field">
              <label>Call</label>
              <div class="seg" id="biasCall">
                <button type="button" data-v="bull">Bull</button>
                <button type="button" data-v="bear">Bear</button>
                <button type="button" data-v="chop">Chop</button>
              </div>
            </div>
            <button type="button" id="commitPrep" class="primary">Commit prep &amp; start</button>
            <div id="prepMsg" class="msg"></div>
          </div>
          <div id="prepReveal" class="box" hidden></div>
        </section>
        <section id="tradePanel" hidden>
          <div class="ticket-title">Trade — draw the bracket on the chart</div>
          <div class="field">
            <label>Side</label>
            <div class="seg" id="side">
              <button type="button" data-v="long" class="active">Long</button>
              <button type="button" data-v="short">Short</button>
            </div>
          </div>
          <div class="field">
            <label>Order</label>
            <div class="seg" id="orderType">
              <button type="button" data-v="market" class="active">Market</button>
              <button type="button" data-v="limit">Limit</button>
              <button type="button" data-v="stop">Stop</button>
            </div>
          </div>
          <div class="field">
            <label>Draw</label>
            <div class="seg" id="drawMode" title="Click = click to set entry, then drag stop/target · Drag = drag all three from a seed">
              <button type="button" data-v="click" class="active">Click</button>
              <button type="button" data-v="drag">Drag</button>
            </div>
          </div>
          <div class="field"><label>Size</label><input id="size" type="number" step="1" min="1" value="1" /></div>
          <button type="button" id="draw">✎ Draw on chart</button>
          <button type="button" id="arm" class="primary" hidden>Arm bracket</button>
          <button type="button" id="cancelDraw" hidden>Cancel draw</button>
          <button type="button" id="cancelOrder" hidden>Cancel working order</button>
          <button type="button" id="flatten" disabled>Flatten (F)</button>
          <div id="rr" class="muted"></div>
          <div id="ticketMsg" class="msg"></div>
        </section>
        <div id="posBox" class="box"></div>
        <div id="tradesBox" class="box"></div>
        <section id="gradePanel" hidden>
          <div class="ticket-title">Grade — process over outcome</div>
          <div class="field">
            <label>Journal</label>
            <textarea id="journal" rows="3" placeholder="What did you see, what would you do differently…"></textarea>
          </div>
          <button type="button" id="gradeBtn" class="primary">Grade the attempt</button>
          <div id="gradeMsg" class="msg"></div>
          <div id="reportCard" class="box" hidden></div>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
